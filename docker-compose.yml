services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # Default: qwen2.5-coder:1.5b — top performer in benchmark (64.5% correctness, ~1.2 GB RAM).
      # See decisions.md for full evaluation. For English-heavy use: NL_MODEL=llama3.2:3b (needs ~2 GB RAM).
      - SQL_MODEL=qwen2.5-coder:1.5b
      - NL_MODEL=qwen2.5-coder:1.5b
      - DB_PATH=/app/data/sales.db
      - CSV_PATH=/app/data/data.csv
      - MAX_RETRIES=3
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  ollama_data:

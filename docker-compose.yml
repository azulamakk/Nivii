services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # Default: 1.5b fits on any machine (requires ~1.5 GB RAM).
      # For higher SQL accuracy, set SQL_MODEL=qwen2.5-coder:7b (requires ~5 GB RAM / 8 GB Docker memory).
      - SQL_MODEL=qwen2.5-coder:1.5b
      # Reuses the same model to minimise memory footprint.
      # On machines with more RAM, set NL_MODEL=llama3.2:3b for a general-purpose responder.
      - NL_MODEL=qwen2.5-coder:1.5b
      - DB_PATH=/app/data/sales.db
      - CSV_PATH=/app/data/data.csv
      - MAX_RETRIES=3
    volumes:
      - ./data:/app/data

volumes:
  ollama_data:

services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # SQL model tiers (see decisions.md §8 for rationale):
      #   5 GB Docker: gemma3:4b           — 74.2% correctness, ~4.0 GB RAM (default)
      #   4 GB Docker: qwen2.5-coder:1.5b  — 64.5% correctness, ~1.2 GB RAM (downgrade)
      #   8 GB Docker: qwen2.5-coder:7b    — 80.6% correctness, ~5.5 GB RAM (upgrade, high latency)
      # NL model: qwen2.5-coder:1.5b kept lighter — already loaded, fast, good enough for prose.
      - SQL_MODEL=gemma3:4b
      - NL_MODEL=qwen2.5-coder:1.5b
      - DB_PATH=/app/data/sales.db
      - CSV_PATH=/app/data/data.csv
      - MAX_RETRIES=3
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  ollama_data:

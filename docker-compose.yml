services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # Default: qwen2.5:1.5b — top performer in benchmark (100% correctness, ~1 GB RAM).
      # See decisions.md for full evaluation. For higher accuracy: SQL_MODEL=qwen2.5-coder:7b (needs ~5 GB RAM).
      - SQL_MODEL=qwen2.5:1.5b
      - NL_MODEL=qwen2.5:1.5b
      - DB_PATH=/app/data/sales.db
      - CSV_PATH=/app/data/data.csv
      - MAX_RETRIES=3
    volumes:
      - ./data:/app/data

volumes:
  ollama_data:
